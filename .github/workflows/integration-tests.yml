name: Integration tests

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run integration tests
        env:
          RESTIC_BACKUP_RUN_INTEGRATION: "1"
        run: uv run --extra dev pytest -s -vv tests/integration
