name: Docker release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/infinityvault/restic-backup

jobs:
  docker-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive Docker tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker images
        run: |
          version="${{ steps.version.outputs.tag }}"
          default_tag="${IMAGE_NAME}:${version}"

          echo "Building default image ${default_tag}"
          docker buildx build --push --tag "${default_tag}" .

          variants_file="build-variants.json"
          if [ ! -f "${variants_file}" ]; then
            echo "No ${variants_file} found; only pushed ${default_tag}"
            exit 0
          fi

          mapfile -t variants < <(jq -c '.variants[]' "${variants_file}")
          if [ "${#variants[@]}" -eq 0 ]; then
            echo "ERROR: ${variants_file} exists but has no variants" >&2
            exit 1
          fi

          for variant in "${variants[@]}"; do
            tag_suffix="$(jq -r '.tagSuffix' <<< "${variant}")"
            if [ -z "${tag_suffix}" ] || [ "${tag_suffix}" = "null" ]; then
              echo "ERROR: variant missing tagSuffix in ${variants_file}" >&2
              exit 1
            fi

            image_tag="${IMAGE_NAME}:${version}-${tag_suffix}"
            build_args=()
            while IFS= read -r arg; do
              if [ -n "${arg}" ]; then
                build_args+=(--build-arg "${arg}")
              fi
            done < <(jq -r '.buildArgs // {} | to_entries[] | "\(.key)=\(.value)"' <<< "${variant}")

            echo "Building variant image ${image_tag}"
            docker buildx build --push "${build_args[@]}" --tag "${image_tag}" .
          done
