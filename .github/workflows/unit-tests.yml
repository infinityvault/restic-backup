name: Unit tests

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run unit tests
        run: uv run --extra dev pytest -m "not integration"
