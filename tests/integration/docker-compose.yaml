services:
  restic-backup:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-/backup}
      RESTIC_PASSWORD: integration-test-password
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - data:/data
      - backup:/backup
      - ${RESTIC_BACKUP_IT_CONFIG_DIR}:/configs:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set minio http://minio:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing minio/restic-backup-it

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root-secret

volumes:
  data:
  backup:
