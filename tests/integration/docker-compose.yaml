services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      RESTIC_REPOSITORY: /repo
      RESTIC_PASSWORD: integration-test-password
    volumes:
      - ${RESTIC_BACKUP_IT_DATA_DIR}:/data
      - ${RESTIC_BACKUP_IT_REPO_DIR}:/repo
      - ${RESTIC_BACKUP_IT_CONFIG_DIR}:/configs:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root-secret
